<!DOCTYPE html>
<html lang="en">
<head>
<title>Audio Flags</title>
</head>
<body>
<div id="AudioFlagsConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
     data-require="emby-input,emby-button,emby-checkbox">
  <div data-role="content">
    <div class="content-primary">
      <form id="AudioFlagsConfigForm">
        <h2>Audio Flags</h2>
        <p class="fieldDescription">
          Pod tytułem karty pojawiają się flagi:
          🎧 audio (górna linia), 💬 napisy (dolna linia).
        </p>

        <div class="checkboxContainer">
          <label>
            <input is="emby-checkbox" type="checkbox" id="ShowAudio" />
            <span>Pokazuj flagi audio (🎧)</span>
          </label>
        </div>

        <div class="checkboxContainer">
          <label>
            <input is="emby-checkbox" type="checkbox" id="ShowSubtitles" />
            <span>Pokazuj flagi napisów (💬)</span>
          </label>
        </div>

        <div class="checkboxContainer">
          <label>
            <input is="emby-checkbox" type="checkbox" id="EnglishUsesGB" />
            <span>English → 🇬🇧 (odznacz dla 🇺🇸)</span>
          </label>
        </div>

        <div class="checkboxContainer">
          <label>
            <input is="emby-checkbox" type="checkbox" id="DebugLogging" />
            <span>Debug w konsoli przeglądarki</span>
          </label>
        </div>

        <br/>
        <button is="emby-button" type="submit" class="raised button-submit block">
          <span>Zapisz</span>
        </button>
      </form>
    </div>
  </div>

<script type="text/javascript">
(function () {
  var PluginId = 'b2c3d4e5-f6a7-8899-aabb-ccddeeff0011';

  function load(page) {
    Dashboard.showLoadingMsg();
    ApiClient.getPluginConfiguration(PluginId).then(function (c) {
      page.querySelector('#ShowAudio').checked = c.ShowAudio !== false;
      page.querySelector('#ShowSubtitles').checked = c.ShowSubtitles !== false;
      page.querySelector('#EnglishUsesGB').checked = c.EnglishUsesGB !== false;
      page.querySelector('#DebugLogging').checked = !!c.DebugLogging;
      Dashboard.hideLoadingMsg();
    });
  }

  function save(page) {
    Dashboard.showLoadingMsg();
    ApiClient.getPluginConfiguration(PluginId).then(function (c) {
      c.ShowAudio = page.querySelector('#ShowAudio').checked;
      c.ShowSubtitles = page.querySelector('#ShowSubtitles').checked;
      c.EnglishUsesGB = page.querySelector('#EnglishUsesGB').checked;
      c.DebugLogging = page.querySelector('#DebugLogging').checked;
      ApiClient.updatePluginConfiguration(PluginId, c).then(Dashboard.processPluginConfigurationUpdateResult);
    });
  }

  document.querySelector('#AudioFlagsConfigPage').addEventListener('pageshow', function () {
    load(this);
  });

  document.querySelector('#AudioFlagsConfigForm').addEventListener('submit', function (e) {
    save(this.closest('#AudioFlagsConfigPage'));
    e.preventDefault();
    return false;
  });
})();
</script>
</div>
</body>
</html>
